<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group.error input {
            border-color: #e74c3c;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .form-group.error .error-message {
            display: block;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            padding: 5px;
        }

        .password-toggle-btn:hover {
            color: #333;
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-submit.loading {
            position: relative;
            color: transparent;
        }

        .btn-submit.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            color: #666;
            cursor: pointer;
        }

        .form-options input[type="checkbox"] {
            margin-right: 5px;
            cursor: pointer;
        }

        .form-options a {
            color: #667eea;
            text-decoration: none;
        }

        .form-options a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #666;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>欢迎登录</h1>
            <p>请输入您的账号信息</p>
        </div>

        <form id="loginForm" action="/login" method="POST">
            <div class="form-group" id="usernameGroup">
                <label for="username">用户名</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="请输入用户名"
                    required
                >
                <span class="error-message">用户名不能为空</span>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <div class="password-toggle">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="请输入密码"
                        required
                    >
                    <button type="button" class="password-toggle-btn" id="togglePassword">
                        显示
                    </button>
                </div>
                <span class="error-message">密码不能为空</span>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" name="remember"> 记住我
                </label>
                <a href="/forgot-password">忘记密码？</a>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">登录</button>
        </form>

        <div id="loginError" style="text-align: center; color: #e74c3c; margin-bottom: 15px; display: none;"></div>

        <div class="login-footer">
            还没有账号？<a href="/register">立即注册</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const submitBtn = document.getElementById('submitBtn');
        const loginError = document.getElementById('loginError');
        const usernameGroup = document.getElementById('usernameGroup');

        // 密码显示/隐藏切换
        togglePasswordBtn.addEventListener('click', function() {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePasswordBtn.textContent = isPassword ? '隐藏' : '显示';
        });

        // 清除错误状态
        usernameInput.addEventListener('input', function() {
            usernameGroup.classList.remove('error');
            loginError.style.display = 'none';
        });

        passwordInput.addEventListener('input', function() {
            passwordInput.parentElement.parentElement.classList.remove('error');
            loginError.style.display = 'none';
        });

        // 表单提交
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // 重置错误状态
            usernameGroup.classList.remove('error');
            passwordInput.parentElement.parentElement.classList.remove('error');
            loginError.style.display = 'none';

            // 验证
            let isValid = true;
            if (!usernameInput.value.trim()) {
                usernameGroup.classList.add('error');
                isValid = false;
            }
            if (!passwordInput.value) {
                passwordInput.parentElement.parentElement.classList.add('error');
                isValid = false;
            }

            if (!isValid) return;

            // 加载状态
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const remember = document.querySelector('input[name="remember"]').checked;

            submitBtn.disabled = true;
            submitBtn.classList.add('loading');

            try {
                // TODO: 实现实际的登录逻辑
                // const response = await fetch('/api/login', {
                //     method: 'POST',
                //     headers: { 'Content-Type': 'application/json' },
                //     body: JSON.stringify({ username, password, remember })
                // });

                // 模拟异步请求
                await new Promise(resolve => setTimeout(resolve, 1500));

                console.log('登录信息:', { username, password, remember });
                alert('登录功能需要后端支持，当前仅为前端演示页面');
            } catch (error) {
                loginError.textContent = error.message || '登录失败，请重试';
                loginError.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>

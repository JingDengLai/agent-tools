<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .register-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="tel"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: #e74c3c;
        }

        .form-group input.success {
            border-color: #2ecc71;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            margin-top: 2px;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 13px;
            color: #666;
            cursor: pointer;
        }

        .checkbox-group a {
            color: #667eea;
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e1e1e1;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background-color 0.3s;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: #e74c3c;
        }

        .password-strength-bar.medium {
            width: 66%;
            background: #f1c40f;
        }

        .password-strength-bar.strong {
            width: 100%;
            background: #2ecc71;
        }

        .password-tips {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .code-group {
            display: flex;
            gap: 10px;
        }

        .code-group input {
            flex: 1;
        }

        .send-code-btn {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.3s, opacity 0.3s;
        }

        .send-code-btn:hover:not(:disabled) {
            background: #5a6fd6;
        }

        .send-code-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #ccc;
        }

        .code-countdown {
            color: #999;
            font-size: 14px;
            padding: 12px 15px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>创建账户</h1>
            <p>填写以下信息完成注册</p>
        </div>

        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="username">用户名</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="请输入用户名"
                    required
                    minlength="3"
                    maxlength="20"
                >
                <span class="error-message" id="usernameError"></span>
            </div>

            <div class="form-group">
                <label for="email">邮箱</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="请输入邮箱地址"
                    required
                >
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="phone">手机号</label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="请输入手机号"
                    required
                    pattern="^1[3-9]\d{9}$"
                >
                <span class="error-message" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label for="verifyCode">验证码</label>
                <div class="code-group">
                    <input
                        type="text"
                        id="verifyCode"
                        name="verifyCode"
                        placeholder="请输入短信验证码"
                        required
                        maxlength="6"
                    >
                    <button type="button" class="send-code-btn" id="sendCodeBtn">获取验证码</button>
                </div>
                <span class="error-message" id="verifyCodeError"></span>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="请输入密码"
                    required
                    minlength="6"
                >
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
                <span class="error-message" id="passwordError"></span>
                <span class="password-tips">密码至少 6 位，建议包含字母和数字</span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="请再次输入密码"
                    required
                >
                <span class="error-message" id="confirmPasswordError"></span>
            </div>

            <div class="form-group checkbox-group">
                <input
                    type="checkbox"
                    id="agreement"
                    name="agreement"
                    required
                >
                <label for="agreement">
                    我已阅读并同意 <a href="#">《用户服务协议》</a> 和 <a href="#">《隐私政策》</a>
                </label>
            </div>
            <span class="error-message" id="agreementError" style="margin-bottom: 15px;"></span>

            <button type="submit" class="submit-btn" id="submitBtn">立即注册</button>
        </form>

        <div class="login-link">
            已有账户？<a href="login.html">立即登录</a>
        </div>
    </div>

    <script>
        // 表单验证逻辑
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');

        // 验证规则
        const validators = {
            username: (value) => {
                if (!value.trim()) return '请输入用户名';
                if (value.length < 3) return '用户名至少 3 个字符';
                if (value.length > 20) return '用户名不超过 20 个字符';
                if (!/^[\w\u4e00-\u9fa5]+$/.test(value)) return '用户名只能包含字母、数字、下划线和中文';
                return '';
            },
            email: (value) => {
                if (!value.trim()) return '请输入邮箱';
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) return '请输入有效的邮箱地址';
                return '';
            },
            phone: (value) => {
                if (!value.trim()) return '请输入手机号';
                if (!/^1[3-9]\d{9}$/.test(value)) return '请输入有效的手机号';
                return '';
            },
            verifyCode: (value) => {
                if (!value.trim()) return '请输入验证码';
                if (!/^\d{6}$/.test(value)) return '验证码为 6 位数字';
                return '';
            },
            password: (value) => {
                if (!value) return '请输入密码';
                if (value.length < 6) return '密码至少 6 位';
                return '';
            },
            confirmPassword: (value, password) => {
                if (!value) return '请确认密码';
                if (value !== password) return '两次输入的密码不一致';
                return '';
            }
        };

        // 显示/隐藏错误信息
        function showError(inputId, errorId, message) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);
            input.classList.add('error');
            input.classList.remove('success');
            error.textContent = message;
            error.classList.add('show');
        }

        function hideError(inputId, errorId) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);
            input.classList.remove('error');
            error.classList.remove('show');
        }

        function showSuccess(inputId) {
            const input = document.getElementById(inputId);
            input.classList.add('success');
            input.classList.remove('error');
        }

        // 单个字段验证
        function validateField(fieldId, value, extraValue = '') {
            const error = validators[fieldId](value, extraValue);
            const errorId = fieldId + 'Error';

            if (error) {
                showError(fieldId, errorId, error);
                return false;
            } else {
                hideError(fieldId, errorId);
                showSuccess(fieldId);
                return true;
            }
        }

        // 密码强度检测
        function checkPasswordStrength(password) {
            const strengthBar = document.getElementById('strengthBar');
            let strength = 0;

            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            strengthBar.className = 'password-strength-bar';
            if (strength <= 2) {
                strengthBar.classList.add('weak');
            } else if (strength <= 4) {
                strengthBar.classList.add('medium');
            } else {
                strengthBar.classList.add('strong');
            }
        }

        // 实时验证
        document.getElementById('username').addEventListener('blur', function() {
            validateField('username', this.value);
        });

        document.getElementById('email').addEventListener('blur', function() {
            validateField('email', this.value);
        });

        document.getElementById('phone').addEventListener('blur', function() {
            validateField('phone', this.value);
        });

        // 发送验证码
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        sendCodeBtn.addEventListener('click', function() {
            const phone = document.getElementById('phone').value;

            // 先验证手机号
            if (!validateField('phone', phone)) {
                return;
            }

            // 模拟发送验证码
            sendCodeBtn.disabled = true;
            let countdown = 60;
            sendCodeBtn.textContent = `${countdown}秒后重发`;

            const timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '获取验证码';
                } else {
                    sendCodeBtn.textContent = `${countdown}秒后重发`;
                }
            }, 1000);

            // 模拟 API 请求
            console.log(`向手机号 ${phone} 发送验证码`);
            alert('验证码已发送（模拟）：123456');
        });

        document.getElementById('password').addEventListener('input', function() {
            checkPasswordStrength(this.value);
            validateField('password', this.value);
            // 如果确认密码已输入，也重新验证
            const confirmPassword = document.getElementById('confirmPassword');
            if (confirmPassword.value) {
                validateField('confirmPassword', confirmPassword.value, this.value);
            }
        });

        document.getElementById('confirmPassword').addEventListener('blur', function() {
            const password = document.getElementById('password').value;
            validateField('confirmPassword', this.value, password);
        });

        // 表单提交
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const verifyCode = document.getElementById('verifyCode').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreement = document.getElementById('agreement').checked;

            let isValid = true;

            // 验证所有字段
            if (!validateField('username', username)) isValid = false;
            if (!validateField('email', email)) isValid = false;
            if (!validateField('phone', phone)) isValid = false;
            if (!validateField('verifyCode', verifyCode)) isValid = false;
            if (!validateField('password', password)) isValid = false;
            if (!validateField('confirmPassword', confirmPassword, password)) isValid = false;

            // 验证协议
            const agreementError = document.getElementById('agreementError');
            if (!agreement) {
                agreementError.textContent = '请同意用户服务协议和隐私政策';
                agreementError.classList.add('show');
                isValid = false;
            } else {
                agreementError.classList.remove('show');
            }

            if (isValid) {
                // 模拟提交
                submitBtn.disabled = true;
                submitBtn.textContent = '注册中...';

                // 模拟 API 调用
                setTimeout(() => {
                    console.log('注册数据:', { username, email, phone, verifyCode, password });
                    alert('注册成功！');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '立即注册';
                    form.reset();
                    document.getElementById('strengthBar').className = 'password-strength-bar';
                }, 1500);
            }
        });
    </script>
</body>
</html>
